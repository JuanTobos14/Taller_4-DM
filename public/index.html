<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Barra de Navegación -->
    <nav class="barra-navegacion">
        <ul>
            <li><a href="index.html" class="activo">Registro</a></li>
            <li><a href="catalog.html">Catálogo</a></li>
        </ul>
    </nav>

    <!-- Encabezado -->
    <header class="encabezado">
        <h1>Registro Hot Wheels</h1>
    </header>

    <!-- Formulario para crear/editar -->
    <div class="contenedor-formulario">
        <h2 class="titulo-formulario">Agregar / Editar Auto</h2>
        <form id="itemForm">
            <div class="formulario-flex">
                <div class="grupo-formulario">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" placeholder="Ej: Ford Mustang GT" required>
                </div>

                <div class="grupo-formulario">
                    <label for="categoria">Categoría</label>
                    <input type="text" id="categoria" placeholder="Ej: Muscle Cars">
                </div>

                <div class="grupo-formulario">
                    <label for="precio">Precio</label>
                    <input type="number" id="precio" min="0" placeholder="12000">
                </div>

                <div class="grupo-formulario">
                    <label for="año">Año</label>
                    <input type="number" id="año" min="1968" max="2026" placeholder="2004">
                </div>

                <div class="grupo-formulario">
                    <label for="imagen">URL de Imagen</label>
                    <input type="url" id="imagen" placeholder="https://...">
                </div>
            </div>

            <div class="formulario-flex">
                <div class="grupo-formulario grupo-formulario-completo">
                    <label for="description">Descripción</label>
                    <textarea id="description" rows="3" placeholder="Inserte una descripción detallada del auto..."></textarea>
                </div>

                <div class="formulario-enviar">
                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- Tabla de items -->
    <div class="contenedor-tabla">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Año</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="itemsTable">
                <!-- Los items se cargan dinámicamente -->
            </tbody>
        </table>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
